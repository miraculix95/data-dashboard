# Data Dashboard Configuration

llm:
  provider: openrouter
  # model: x-ai/grok-3-mini           # Grok 3 Mini (fast, capable)
  # model: x-ai/grok-2               # Grok 2 (more powerful)
  # model: openai/gpt-4o-mini        # GPT-4o Mini (cheap & fast)
  # model: openai/gpt-4o             # GPT-4o (best quality)
  # model: anthropic/claude-3-5-haiku-20241022  # Claude Haiku (fast)
  # model: anthropic/claude-sonnet-4-5          # Claude Sonnet
  model: google/gemini-2.0-flash-001   # Gemini Flash (very cheap)
  # model: deepseek/deepseek-chat    # DeepSeek V3 (cheap)
  max_tokens: 5000
  temperature: 0.7

github:
  cache_ttl_seconds: 604800   # 1 week
  default_limit: 10
  default_language: ""

summary:
  enabled: true
  top_n: 10
  language: de                # de = German, en = English

news:
  cache_ttl_seconds: 14400    # 4 hours
  top_n: 8                    # number of articles to show after LLM filter
  language: de                # de = German, en = English
  sources:
    hackernews: true          # via public API, no Firecrawl needed
    the_decoder: true         # https://the-decoder.de (German AI news)
    venturebeat: true         # https://venturebeat.com/category/ai/

image_generation:
  enabled: true               # true | false — disable to skip image generation entirely

  # -----------------------------------------------------------------------
  # PROVIDER: fal
  # Key: FAL_KEY in devhub/.env
  # Docs: https://fal.ai/models
  # -----------------------------------------------------------------------
  # provider: fal
  # api_key_env: FAL_KEY
  # image_size: landscape_16_9   # landscape_16_9 | square_hd | portrait_4_3 | landscape_4_3
  #
  # Models (uncomment one):
  # model: fal-ai/flux/schnell        # Flux Schnell — sehr schnell, günstig (~$0.003/Bild)
  # model: fal-ai/flux/dev            # Flux Dev — besser, langsamer
  # model: fal-ai/flux-pro            # Flux Pro — höchste Qualität, teurer
  # model: fal-ai/flux-pro/v1.1       # Flux Pro 1.1 — neueste Version
  # model: fal-ai/imagen4/preview     # Google Imagen 4 via FAL (braucht FAL_KEY, nicht GEMINI_KEY)
  # model: fal-ai/recraft-v3          # Recraft V3 — sehr gute Bildqualität
  # model: fal-ai/stable-diffusion-v3-medium  # SD3 Medium

  # -----------------------------------------------------------------------
  # PROVIDER: google
  # Key: GEMINI_API_KEY in devhub/.env
  # Docs: https://ai.google.dev/api/images
  # -----------------------------------------------------------------------
  # provider: google
  # api_key_env: GEMINI_API_KEY
  # image_size: "16:9"    # "1:1" | "4:3" | "3:4" | "16:9" | "9:16"
  #
  # Models (uncomment one):
  # model: imagen-3.0-generate-002              # Imagen 3 — stabil, günstig
  # model: imagen-4.0-generate-preview-05-20    # Imagen 4 (Nano Banana) — beste Qualität

  # -----------------------------------------------------------------------
  # AKTIVE KONFIGURATION
  # -----------------------------------------------------------------------
  provider: fal
  api_key_env: FAL_KEY
  model: fal-ai/flux/schnell
  image_size: landscape_16_9
